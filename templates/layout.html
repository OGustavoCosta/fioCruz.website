<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Fiocruz{% endblock %}</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'blue':         '#1351b4',
            'dark-blue':    '#0c326f',
            'dark-cyan':    '#037478',
            'cyan':         '#0bb19d',
            'teal':         '#00796B',
            'teal-dark':    '#004D40',
            'teal-light':   '#E0F2F1',
            'green':        '#268744',
            'yellow':       '#ffd125',
            'red':          '#a23737',
            'neutral-900':  '#000',
            'neutral-600':  '#121212',
            'neutral-500':  '#393939',
            'neutral-400':  '#626262',
            'neutral-300':  '#9a9a9a',
            'neutral-200':  '#cacaca',
            'neutral-175':  '#dcdcdc',
            'neutral-150':  '#ebebeb',
            'neutral-100':  '#f1f1f1',
            'neutral-50':   '#f5f5f7',
            'neutral-0':    '#fff',
          },
          fontFamily: {
            'rawline': ['Rawline', 'sans-serif'],
          },
          spacing: {
            'mobile-padding': '1rem',
            'desktop-padding': '2rem',
          },
          maxWidth: {
            'width-size': '1280px',
          },
        }
      }
    }
  </script>

  <!-- Lucide -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- CSS customizado -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />

  {% block extra_css %}{% endblock %}
</head>
<body class="mainLayout grid grid-rows-[auto_1fr_auto] w-full min-h-dvh">

  <!-- Skip to content (eMAG) -->
  <a href="#main" class="skip-link">Pular para o conteúdo principal</a>

  {% include 'components/header.html' %}

  <main id="main" class="mainLayout__main w-full bg-neutral-50 flex flex-col">
    {% block content %}{% endblock %}
  </main>

  {% include 'components/footer.html' %}

  <!-- Ajuste de tamanho de fonte (eMAG) -->
  <div class="fontSize__group" role="group" aria-label="Ajustar tamanho da fonte">
    <button id="btn-fonte-grande"  class="fontSize__btn fontSize__btn--large"  aria-label="Aumentar fonte" aria-pressed="false">A+</button>
    <button id="btn-fonte-normal"  class="fontSize__btn fontSize__btn--normal is-active" aria-label="Fonte normal"   aria-pressed="true">A</button>
    <button id="btn-fonte-pequeno" class="fontSize__btn fontSize__btn--small"  aria-label="Diminuir fonte" aria-pressed="false">A-</button>
  </div>

  <!-- Alto Contraste -->
  <button
    id="btn-alto-contraste"
    class="highContrast__btn"
    aria-label="Ativar alto contraste"
    aria-pressed="false"
    title="Alto contraste"
  >
    <i data-lucide="contrast" width="20" height="20"></i>
    <span>Alto<br>Contraste</span>
  </button>

  <!-- VLibras -->
  <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
      <div class="vw-plugin-top-wrapper"></div>
    </div>
  </div>

  <!-- Inicializa ícones Lucide -->
  <script>lucide.createIcons()</script>
  <script src="{{ url_for('static', filename='js/header.js') }}"></script>
  <script src="{{ url_for('static', filename='js/accessibility.js') }}"></script>
  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>

  <script>
    new window.VLibras.Widget('https://vlibras.gov.br/app');
  </script>

  <script>

    document.addEventListener("DOMContentLoaded", function(){

      const btn = document.getElementById("botao-acessibilidade")

      if(btn){

        btn.addEventListener("click", function(e){
          e.preventDefault()

          const widget = document.querySelector("[vw]")

          if(widget){
            widget.classList.toggle("enabled")
          }

        })

      }

    })

  </script>

  {% block extra_js %}{% endblock %}

</body>
</html>
